<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Discuss Entry · UFicon Dev Radar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Sarabun',sans-serif;background:#07090f;color:#e2e8f0;min-height:100vh;padding:0 24px 48px}
.container{max-width:800px;margin:0 auto}

/* Nav */
.nav{display:flex;align-items:center;justify-content:center;gap:28px;padding:22px 0;margin-bottom:36px;border-bottom:1px solid rgba(255,255,255,.06)}
.nav a{font-size:12.5px;font-weight:700;letter-spacing:.5px;color:#475569;text-decoration:none;padding:6px 2px;border-bottom:2px solid transparent;transition:all .15s}
.nav a:hover{color:#a5b4fc}
.nav a.active{color:#a5b4fc;border-color:#818cf8}

.back-link{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:#475569;text-decoration:none;margin-bottom:24px}
.back-link:hover{color:#a5b4fc}

.doc{background:#0c1220;border:1px solid rgba(99,102,241,.2);border-radius:14px;padding:36px 40px;margin-bottom:32px}
.doc h1{font-size:26px;font-weight:900;letter-spacing:-.5px;color:white;margin-bottom:18px;line-height:1.3}
.doc h2{font-size:14px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#22d3ee;margin:28px 0 14px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.06)}
.doc h2:first-of-type{margin-top:0}
.doc h3{font-size:15px;font-weight:700;color:#a5b4fc;margin:20px 0 8px}
.doc p{font-size:14.5px;color:#94a3b8;line-height:1.75;margin-bottom:12px}
.doc ul,.doc ol{margin:0 0 12px 22px;color:#94a3b8}
.doc li{font-size:14.5px;line-height:1.75;margin-bottom:6px}
.doc strong{color:#e2e8f0;font-weight:700}
.doc code{background:rgba(99,102,241,.12);color:#a5b4fc;padding:2px 6px;border-radius:4px;font-size:13px;font-family:'JetBrains Mono',monospace}
.doc pre{background:#070a12;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px 18px;overflow-x:auto;margin-bottom:14px}
.doc pre code{background:none;padding:0;color:#cbd5e1}
.doc a{color:#818cf8}
.doc blockquote{border-left:3px solid rgba(99,102,241,.4);padding-left:16px;color:#64748b;margin-bottom:12px}
.doc hr{border:none;border-top:1px solid rgba(255,255,255,.08);margin:24px 0}
.mermaid{background:#070a12;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:20px;margin-bottom:16px;display:flex;justify-content:center}

.state{text-align:center;padding:60px 20px;color:#3d4f6a;font-size:13px}

footer{text-align:center;font-size:12px;color:#1e293b;display:flex;align-items:center;justify-content:center;gap:10px}
footer a{color:#1e293b;text-decoration:none}
footer a:hover{color:#475569}
</style>
</head>
<body>
<div class="container">
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="discuss.html" class="active">Discuss ActionPlan</a>
    <a href="index.html#archive">Archive</a>
  </nav>

  <a href="discuss.html" class="back-link">&larr; กลับไปหน้า Discuss ActionPlan</a>

  <div id="doc" class="doc">
    <div class="state">กำลังโหลด...</div>
  </div>

  <footer>
    UFicon Dev Team &nbsp;·&nbsp;
    <a href="https://github.com/allday9z/uficon-dev-radar" target="_blank">GitHub</a>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script type="module">
  // Single module script — guarantees mermaid is imported and initialized
  // before the fetch/render logic below ever tries to call mermaid.run().
  // (A separate classic <script> running the fetch would race a deferred
  // module script and call mermaid before it exists.)
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ startOnLoad: false, theme: 'dark' });

  const docEl = document.getElementById('doc');
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id || !/^[0-9]{4}-[0-9]{2}-[0-9]{2}$/.test(id)) {
    docEl.innerHTML = '<div class="state">ไม่พบ entry ที่ต้องการ — ตรวจสอบลิงก์อีกครั้ง</div>';
  } else {
    try {
      const res = await fetch(`discuss/${id}.md`);
      if (!res.ok) throw new Error('not found');
      const md = await res.text();

      // Pull out ```mermaid fences before marked touches them, so mermaid
      // gets the raw diagram source instead of marked's escaped <pre><code>.
      const mermaidBlocks = [];
      const withoutMermaid = md.replace(/```mermaid\n([\s\S]*?)```/g, (_, code) => {
        const token = `@@MERMAID_${mermaidBlocks.length}@@`;
        mermaidBlocks.push(code.trim());
        return token;
      });

      let html = window.marked.parse(withoutMermaid);
      mermaidBlocks.forEach((code, i) => {
        html = html.replace(`@@MERMAID_${i}@@`, `<div class="mermaid">${code}</div>`);
      });

      docEl.innerHTML = html;
      if (mermaidBlocks.length) await mermaid.run({ querySelector: '.mermaid' });
    } catch (err) {
      docEl.innerHTML = '<div class="state">โหลด entry ไม่สำเร็จ — ไฟล์อาจถูกย้ายหรือไม่มีอยู่</div>';
    }
  }
</script>
</body>
</html>
